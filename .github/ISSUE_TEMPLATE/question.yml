name: Question
description: Ask about setup, usage, architecture, or governance boundaries.
title: "[Question]: "
labels: ["question", "rc-feedback"]
body:
  - type: input
    id: version
    attributes:
      label: CVF version or tag
      placeholder: v4.0.0-rc.1
    validations:
      required: false
  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Setup or deployment
        - Non-coder web flow
        - Governance proof
        - Extension authoring
        - Architecture
        - Other
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to understand or decide?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Share what you tried, links to docs you read, or constraints you are working under.
    validations:
      required: false
