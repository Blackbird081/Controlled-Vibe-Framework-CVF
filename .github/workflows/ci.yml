name: CVF CI Pipeline
on:
  push:
    branches: [main, cvf-next]
  pull_request:
    branches: [main]

jobs:
  guard-contract-tests:
    name: Guard Contract Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: EXTENSIONS/CVF_GUARD_CONTRACT
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: EXTENSIONS/CVF_GUARD_CONTRACT/package-lock.json
      - run: npm ci
      - run: npx vitest run
      - run: npx vitest run --coverage
        continue-on-error: true

  web-ui-tests:
    name: Web UI Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: EXTENSIONS/CVF_v1.6_AGENT_PLATFORM/cvf-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: EXTENSIONS/CVF_v1.6_AGENT_PLATFORM/cvf-web/package-lock.json
      - run: npm ci
      - run: npm run test:run
      - name: Coverage Check
        run: npm run test:coverage
        continue-on-error: true

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [guard-contract-tests, web-ui-tests]
    defaults:
      run:
        working-directory: EXTENSIONS/CVF_v1.6_AGENT_PLATFORM/cvf-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: EXTENSIONS/CVF_v1.6_AGENT_PLATFORM/cvf-web/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          GOOGLE_AI_API_KEY: placeholder
          NEXTAUTH_SECRET: ci-test-secret
          NEXTAUTH_URL: http://localhost:3000
