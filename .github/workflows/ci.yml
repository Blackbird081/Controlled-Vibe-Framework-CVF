name: CVF CI Pipeline
on:
  push:
    branches: [main, cvf-next]
  pull_request:
    branches: [main]

jobs:
  guard-contract-tests:
    name: Guard Contract Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: EXTENSIONS/CVF_GUARD_CONTRACT
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: EXTENSIONS/CVF_GUARD_CONTRACT/package-lock.json
      - name: Install Control Plane Foundation dependencies
        working-directory: EXTENSIONS/CVF_CONTROL_PLANE_FOUNDATION
        run: npm ci
      - name: Install Intent Validation dependencies
        working-directory: EXTENSIONS/CVF_ECO_v1.0_INTENT_VALIDATION
        run: npm install --no-audit --no-fund
      - name: Install Model Gateway dependencies
        working-directory: EXTENSIONS/CVF_MODEL_GATEWAY
        run: npm install --no-audit --no-fund
      - name: Install Learning Plane Foundation dependencies
        working-directory: EXTENSIONS/CVF_LEARNING_PLANE_FOUNDATION
        run: npm ci
      - run: npm ci
      - run: npx vitest run
      - run: npx vitest run --coverage
        continue-on-error: true

  web-ui-tests:
    name: Web UI Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: EXTENSIONS/CVF_v1.6_AGENT_PLATFORM/cvf-web
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: EXTENSIONS/CVF_v1.6_AGENT_PLATFORM/cvf-web/package-lock.json
      - name: Governance Hook Chain
        working-directory: ${{ github.workspace }}
        run: python governance/compat/run_local_governance_hook_chain.py --hook pre-commit
      - name: Install Control Plane Foundation dependencies
        working-directory: EXTENSIONS/CVF_CONTROL_PLANE_FOUNDATION
        run: npm ci
      - name: Install Model Gateway dependencies
        working-directory: EXTENSIONS/CVF_MODEL_GATEWAY
        run: npm install --no-audit --no-fund
      - name: Install Learning Plane Foundation dependencies
        working-directory: EXTENSIONS/CVF_LEARNING_PLANE_FOUNDATION
        run: npm ci
      - name: Install CVF Guard Contract dependencies
        working-directory: EXTENSIONS/CVF_GUARD_CONTRACT
        run: npm ci
      - run: npm ci
      - run: npm run test:run
      - name: Coverage Check
        run: npm run test:coverage
        continue-on-error: true

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [guard-contract-tests, web-ui-tests]
    defaults:
      run:
        working-directory: EXTENSIONS/CVF_v1.6_AGENT_PLATFORM/cvf-web
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: EXTENSIONS/CVF_v1.6_AGENT_PLATFORM/cvf-web/package-lock.json
      - name: Install Control Plane Foundation dependencies
        working-directory: EXTENSIONS/CVF_CONTROL_PLANE_FOUNDATION
        run: npm ci
      - name: Install Model Gateway dependencies
        working-directory: EXTENSIONS/CVF_MODEL_GATEWAY
        run: npm install --no-audit --no-fund
      - name: Install Learning Plane Foundation dependencies
        working-directory: EXTENSIONS/CVF_LEARNING_PLANE_FOUNDATION
        run: npm ci
      - name: Install CVF Guard Contract dependencies
        working-directory: EXTENSIONS/CVF_GUARD_CONTRACT
        run: npm ci
      - run: npm ci
      - run: npm run build
        env:
          GOOGLE_AI_API_KEY: placeholder
          NEXTAUTH_SECRET: ci-test-secret
          NEXTAUTH_URL: http://localhost:3000
