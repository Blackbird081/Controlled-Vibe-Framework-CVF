name: CVF Static CI Gate

on:
  push:
    branches: [main, cvf-next]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-ci-gate:
    name: Static CI Gate (no provider secrets)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before || 'HEAD' }}
      HEAD_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: EXTENSIONS/CVF_v1.6_AGENT_PLATFORM/cvf-web/package-lock.json

      - name: Install CVF Guard Contract dependencies
        working-directory: EXTENSIONS/CVF_GUARD_CONTRACT
        run: npm ci

      - name: Install Web dependencies
        working-directory: EXTENSIONS/CVF_v1.6_AGENT_PLATFORM/cvf-web
        run: npm ci

      - name: Run static CI gate
        run: python scripts/run_cvf_static_ci_gate.py --json
