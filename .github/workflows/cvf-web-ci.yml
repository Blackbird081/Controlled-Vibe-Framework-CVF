name: CVF v1.6 Web CI

on:
  push:
    paths:
      - "EXTENSIONS/CVF_v1.6_AGENT_PLATFORM/cvf-web/**"
      - ".github/workflows/cvf-web-ci.yml"
  pull_request:
    paths:
      - "EXTENSIONS/CVF_v1.6_AGENT_PLATFORM/cvf-web/**"
      - ".github/workflows/cvf-web-ci.yml"

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: EXTENSIONS/CVF_v1.6_AGENT_PLATFORM/cvf-web
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: EXTENSIONS/CVF_v1.6_AGENT_PLATFORM/cvf-web/package-lock.json
      - name: Compatibility gate (impact report)
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          python ../../../governance/compat/check_core_compat.py --base "$BASE_SHA" --head "$HEAD_SHA" --json --write-report ../../../governance/compat/last-report.json
          python ../../../governance/compat/check_core_compat.py --base "$BASE_SHA" --head "$HEAD_SHA"
      - name: Install Control Plane Foundation dependencies
        working-directory: EXTENSIONS/CVF_CONTROL_PLANE_FOUNDATION
        run: npm ci
      - name: Install Model Gateway dependencies
        working-directory: EXTENSIONS/CVF_MODEL_GATEWAY
        run: npm install --no-audit --no-fund
      - name: Install Learning Plane Foundation dependencies
        working-directory: EXTENSIONS/CVF_LEARNING_PLANE_FOUNDATION
        run: npm ci
      - name: Install CVF Guard Contract dependencies
        working-directory: EXTENSIONS/CVF_GUARD_CONTRACT
        run: npm ci
      - name: Install
        run: npm ci
      - name: Dependency audit
        run: npm audit --audit-level=high
      - name: Lint
        run: npm run lint -- --max-warnings=0
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm run test:run
      - name: Coverage (threshold gate)
        run: npm run test:coverage
