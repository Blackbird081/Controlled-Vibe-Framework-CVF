      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Enforce enterprise evidence pack consistency
        run: |
          python governance/compat/check_enterprise_evidence_pack.py --packet docs/reviews/cvf_phase_governance/CVF_RELEASE_APPROVAL_PACKET_LOCAL_BASELINE_2026-03-07.md --enforce

  conformance-artifact-consistency:
    name: Conformance Artifact Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Rebuild conformance artifacts
        run: |
          python scripts/run_cvf_cross_extension_conformance.py

      - name: Enforce conformance artifact consistency
        run: |
          python governance/compat/check_conformance_artifact_consistency.py --enforce

  conformance-golden-diff:
    name: Conformance Golden Diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Rebuild canonical conformance artifacts
        run: |
          python scripts/run_cvf_cross_extension_conformance.py

      - name: Enforce conformance golden diff
        run: |
          python governance/compat/check_conformance_golden_diff.py --enforce

  conformance-release-grade:
    name: Conformance Release Grade
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Rebuild canonical conformance artifacts
        run: |
          python scripts/run_cvf_cross_extension_conformance.py

      - name: Enforce conformance release-grade gate
        run: |
          python scripts/run_cvf_conformance_release_gate.py

  markdown-lint:
    name: Markdown Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install markdownlint
        run: npm install -g markdownlint-cli
      
      - name: Lint all markdown files
        run: |
          markdownlint --config .markdownlintrc '**/*.md' \
            --ignore node_modules \
            --ignore .git
        continue-on-error: false

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -e ./EXTENSIONS/CVF_v1.3_IMPLEMENTATION_TOOLKIT/sdk
      
      - name: Run unit tests
        run: |
          pytest EXTENSIONS/CVF_v1.3_IMPLEMENTATION_TOOLKIT/sdk/tests/unit \
            -v \
            --cov=EXTENSIONS/CVF_v1.3_IMPLEMENTATION_TOOLKIT/sdk \
            --cov-report=xml \
            --cov-report=html
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e ./EXTENSIONS/CVF_v1.3_IMPLEMENTATION_TOOLKIT/sdk
      
      - name: Run integration tests
        run: |
          pytest EXTENSIONS/CVF_v1.3_IMPLEMENTATION_TOOLKIT/sdk/tests/integration \
            -v \
            --tb=short

  documentation-build:
    name: Documentation Build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Validate documentation structure
        run: |
          echo "Checking for required documentation files..."
          test -f docs/DOCUMENTATION_STYLE_GUIDE.md || exit 1
          test -f docs/EXPERT_ASSESSMENT_ROADMAP_29012026.md || exit 1
          test -f .markdownlintrc || exit 1
          echo "✓ All required documentation files present"

  registry-validate:
    name: Governance Registry Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Validate governance registry
        run: |
          python governance/skill-library/registry/validate_registry.py

  status-check:
    name: Status Check
    runs-on: ubuntu-latest
    needs: [docs-governance-compat, baseline-update-compat, depth-audit-continuation-compat, gc018-stop-boundary-semantics, session-governance-bootstrap, progress-tracker-sync, multi-agent-review-governance, boardroom-runtime-governance, extension-package-check, incremental-test-log-rotation, conformance-trace-rotation, python-automation-size, governed-file-size, test-partition-ownership, release-manifest-consistency, cross-channel-guard-compat, guard-registry-compat, guard-authoring-standard, active-window-registry, foundational-guard-surfaces, enterprise-evidence-pack, conformance-artifact-consistency, conformance-golden-diff, conformance-release-grade, markdown-lint, test, integration-test, documentation-build, registry-validate]
    if: always()
    
    steps:
      - name: Check status
        run: |
          echo "All checks completed"
          echo "Docs governance compat: ${{ needs.docs-governance-compat.result }}"
          echo "Baseline update compat: ${{ needs.baseline-update-compat.result }}"
          echo "Depth-audit continuation compat: ${{ needs.depth-audit-continuation-compat.result }}"
          echo "GC-018 stop-boundary semantics: ${{ needs.gc018-stop-boundary-semantics.result }}"
          echo "Session governance bootstrap: ${{ needs.session-governance-bootstrap.result }}"
          echo "Progress tracker sync: ${{ needs.progress-tracker-sync.result }}"
          echo "Multi-agent review governance: ${{ needs.multi-agent-review-governance.result }}"
          echo "Boardroom runtime governance: ${{ needs.boardroom-runtime-governance.result }}"
          echo "Extension package check: ${{ needs.extension-package-check.result }}"
          echo "Incremental test log rotation: ${{ needs.incremental-test-log-rotation.result }}"
          echo "Conformance trace rotation: ${{ needs.conformance-trace-rotation.result }}"
          echo "Python automation size: ${{ needs.python-automation-size.result }}"
          echo "Governed file size: ${{ needs.governed-file-size.result }}"
          echo "Test partition ownership: ${{ needs.test-partition-ownership.result }}"
          echo "Release manifest consistency: ${{ needs.release-manifest-consistency.result }}"
          echo "Cross-channel guard compat: ${{ needs.cross-channel-guard-compat.result }}"
          echo "Guard registry compat: ${{ needs.guard-registry-compat.result }}"
          echo "Guard authoring standard: ${{ needs.guard-authoring-standard.result }}"
          echo "Active window registry: ${{ needs.active-window-registry.result }}"
          echo "Foundational guard surfaces: ${{ needs.foundational-guard-surfaces.result }}"
          echo "Enterprise evidence pack: ${{ needs.enterprise-evidence-pack.result }}"
          echo "Conformance artifact consistency: ${{ needs.conformance-artifact-consistency.result }}"
          echo "Conformance golden diff: ${{ needs.conformance-golden-diff.result }}"
          echo "Conformance release grade: ${{ needs.conformance-release-grade.result }}"
          echo "Markdown lint: ${{ needs.markdown-lint.result }}"
          echo "Unit tests: ${{ needs.test.result }}"
          echo "Integration tests: ${{ needs.integration-test.result }}"
          echo "Documentation: ${{ needs.documentation-build.result }}"
          echo "Registry validation: ${{ needs.registry-validate.result }}"
