name: Documentation & Testing

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.md'
      - 'governance/contracts/**'
      - 'governance/compat/**'
      - 'governance/skill-library/registry/**.py'
      - 'governance/skill-library/registry/**.md'
      - 'EXTENSIONS/CVF_v1.5.2_SKILL_LIBRARY_FOR_END_USERS/**.skill.md'
      - 'EXTENSIONS/CVF_ECO_v2.5_MCP_SERVER/src/guards/**'
      - 'EXTENSIONS/CVF_v1.6_AGENT_PLATFORM/cvf-web/src/lib/guard-runtime-adapter.ts'
      - 'sdk/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, develop ]

jobs:
  docs-governance-compat:
    name: Docs Governance Compat
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Enforce docs governance guard
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          python governance/compat/check_docs_governance_compat.py --base "$BASE_SHA" --head "$HEAD_SHA" --enforce

  baseline-update-compat:
    name: Baseline Update Compat
    runs-on: ubuntu-latest
