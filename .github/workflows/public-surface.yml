name: CVF Public Surface

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  public-surface:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check public surface
        run: python scripts/check_public_surface.py

